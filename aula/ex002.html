<!DOCTYPE html>
<html lang="pt-br">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Segundo JS</title>
</head>
<body>
      <h1>Segundo JavaScript</h1>
      <script>
            var nome = window.prompt('Qual é seu nome?') // Uma janela que abre um campo para resposta, seja ela string ou number
            window.alert('É um grande prazer em te conhecer, ' + nome + '!') // sinal de + serve para concatenação
      </script>
</body>
</html>
