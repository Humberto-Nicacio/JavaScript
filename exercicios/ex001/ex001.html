<!DOCTYPE html>
<html lang="pt-br">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Primeiro JS</title>
</head>
<body>
      <h1>Primeiro JavaScript</h1>
      <script>
            window.alert('Olá, Mundo!') // Janela de alerta
            window.confirm('Você está gostando?') // Janela com botão Ok e Cancel
            window.prompt('Qual é seu nome?') // Uma janela que abre um campo para resposta, seja ela string ou number
      </script>
</body>
</html>
